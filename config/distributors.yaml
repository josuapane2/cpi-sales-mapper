# CPI Distributor Templates (22).
# Each entry stores distributor metadata, file-reading hints, column mapping
# guesses (auto-detect refines these), qty unit, and rules.
# Column values are BEST-GUESS header names; the app auto-detects and lets the
# user override on the Column Mapping screen.
#
# PER-ROW UNIT (Satuan):
#   - qty_unit  = the DEFAULT unit for the whole file (used when a row has no
#                 unit value, or when there is no Satuan column at all).
#   - unit      = OPTIONAL header name of a per-row "Satuan" column. When set
#                 (or auto-detected), EACH row converts by its own unit, so a
#                 file can mix carton and pcs rows freely.
#   Recognized synonyms -> canonical unit:
#       carton   <- carton, karton, ctn, dus, kardus, box, boks, dos
#       pcs      <- pcs, pc, pack, pak, pck, bungkus, bks, sachet
#       innerbox <- inner box, innerbox, inner, ib   (RTG only)
#   Example:  columns: {..., qty: "Qty", unit: "Satuan", qty_unit: "pcs"}

distributors:

  PANJUNAN_BANDUNG:
    distributor: {name: "PT Panjunan Bandung", alias: "PNJ-BDG", cabang: "Jawa Barat", area: "Bandung", type: "Dist. Fiesta"}
    file: {format: xlsx, header_row: 0, skip_rows: 0}
    columns: {date: "Date", sku_name: "ProductName", sku_code: "ProductCode", qty: "TotalQuantity", qty_unit: "pcs", customer: "CustomerName", customer_code: "CustomerCode", salesman_code: "SalesmanCode", salesman_name: "SalesmanName", status: "Status"}
    rules: {rtg_detect: name, include_draft: true}

